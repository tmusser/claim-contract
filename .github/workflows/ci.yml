name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: pytest
      - run: claim-contract validate examples/descriptive_summary/contract.yaml
      - run: claim-contract validate examples/descriptive_summary/contract.yaml --json > /dev/null
      - run: claim-contract validate examples/missing_uncertainty/contract.yaml
      - run: |
          set +e
          claim-contract validate examples/missing_uncertainty/contract.yaml --warnings-as-errors
          code=$?
          set -e
          test "$code" -eq 1
      - run: |
          set +e
          claim-contract validate examples/onboarding_conversion/contract.yaml
          code=$?
          set -e
          test "$code" -eq 1
