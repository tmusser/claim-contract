name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Verify environment and source compilation
        run: |
          python -m pip check
          python -m compileall -q src tests

      - name: Run test suite
        run: pytest

      - name: Exercise CLI verdict and output paths
        run: |
          claim-contract validate examples/descriptive_summary/contract.yaml
          claim-contract validate examples/descriptive_summary/contract.yaml --json > /dev/null
          claim-contract validate examples/missing_uncertainty/contract.yaml

          set +e
          claim-contract validate examples/missing_uncertainty/contract.yaml --warnings-as-errors
          review_code=$?
          claim-contract validate examples/onboarding_conversion/contract.yaml
          block_code=$?
          set -e

          test "$review_code" -eq 1
          test "$block_code" -eq 1

  package:
    name: Build and install wheel
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build and inspect distributions
        run: |
          python -m build
          python -m twine check dist/*

      - name: Install wheel in an isolated environment
        run: |
          python -m venv .venv-smoke
          .venv-smoke/bin/python -m pip install --upgrade pip
          .venv-smoke/bin/python -m pip install dist/*.whl
          .venv-smoke/bin/python -m pip check
          .venv-smoke/bin/claim-contract validate examples/descriptive_summary/contract.yaml --json > report.json

      - name: Verify installed CLI preserves scope fields
        run: |
          .venv-smoke/bin/python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("report.json").read_text(encoding="utf-8"))
          assert payload["type"] == "claim_contract.report"
          assert payload["schema_version"] == "1.0"
          assert payload["scientific_validation"] is False
          assert "not scientific validation" in payload["scope_notice"].lower()
          assert payload["not_evaluated"]
          PY
